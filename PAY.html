<html><!-- Customer Details & Payment Section -->
<div id="customerDetails" style="max-width: 400px; margin-top:20px; background:#fff; padding:15px; border-radius:10px; box-shadow:0 2px 6px rgba(0,0,0,0.2);">
  <h3>Customer Information</h3>
  <input type="text" id="customerName" placeholder="Full Name" required><br><br>
  <input type="email" id="customerEmail" placeholder="Email" required><br><br>
  <input type="text" id="customerPhone" placeholder="Phone Number" required><br><br>
  
  <h3>Payment Details</h3>
  <input type="text" id="cardNumber" placeholder="Card Number" required><br><br>
  <input type="text" id="cardExpiry" placeholder="MM/YY" required><br><br>
  <input type="text" id="cardCVC" placeholder="CVC" required><br><br>
</div></html>
